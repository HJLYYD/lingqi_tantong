system:
  use_onnx: true
  # SpacemiT EP (RVV 1.0 + IME 2.0 TOPS hardware accel via libspacemit_ep.so).
  # IMPORTANT: SpacemiT EP only supports INT8-quantized models (.q.onnx
  # produced by xquant, per Bianbu 4.3 / 7.1 docs). Feeding FP32 models
  # causes worker-thread std::runtime_error("tcm buffer alloc failed").
  # The bridge auto-detects quantization (scans for QuantizeLinear/
  # QLinearConv ops) and only registers the EP for quantized models;
  # FP32 models silently use CPU EP (still real ONNX, no acceleration).
  # Quantize with SpacemiT's xquant tool:
  #   https://bianbu.spacemit.com/en/brdk/Advanced_development/7.1_Model_Quantization/
  use_spacemit_ep: true
  # Per-session intra-op threads for SpacemiT EP. K1 has only ~512KB TCM
  # per AI core (cluster 0).  Each thread needs its own TCM workspace.
  #   intra=1: ~170KB TCM per session — allows up to 3 EP sessions (510KB/512KB)
  #   intra=2: ~340KB TCM — allows 1 EP session safely, 2 risky (680KB > 512KB)
  #   intra=3: ~510KB TCM — 1 EP session only
  #   intra=4: may trigger "tcm buffer alloc failed" — do not use
  # K1 Cluster0: 512KB shared TCM across 4 AI cores.
  # intra=1 maximizes EP coverage: YOLO11 + YOLOv8-Pose + Face (3 EP sessions).
  spacemit_ep_intra_threads: 1  # intra=1 only - Bianbu 2.3.3 K1 crashes at intra>=2 (tcm buffer alloc failed core 2)
  log_level: INFO
  startup_mode: realtime
  max_frames: 0
  ring_buffer_size: 16
  target_fps: 15.0
  worker_threads: 4

video:
  source: camera
  camera_device: "/dev/video0"
  camera_width: 640
  camera_height: 480
  camera_fps: 15.0
  camera_format: MJPEG
  camera_buffer_count: 4
  video_path: ""
  output_path: "output/result.mp4"
  save_frame_interval: 1

arrow:
  uart_device_A: "/dev/ttyS0"
  uart_device_C: "/dev/ttyS1"
  baudrate: 3000000
  data_bits: 8
  stop_bits: 1
  parity: none
  enable_fec: false
  dual_link: true
  reconnect_max_delay_s: 16
  reconnect_initial_delay_s: 1
  frame_timeout_s: 10              # auto-exit after N seconds of no frames in realtime mode

mjpeg:
  # WiFi MJPEG HTTP receiver for ESP32 camera (test-ov-imu.ino).
  # Enables receiving JPEG frames over WiFi HTTP instead of Arrow UART.
  # Enable via --mjpeg CLI flag
  enabled: false
  # ESP32 WiFi AP IP
  esp_ip: "192.168.4.1"
  # HTTP port
  esp_port: 80
  # ESP32 AP SSID (leave empty if pre-configured externally)
  wifi_ssid: "ESP32-Camera-AP"
  # ESP32 AP password
  wifi_password: "12345678"
  # Poll /imu endpoint for accel/gyro data
  imu_enabled: true
  # IMU poll interval in milliseconds
  imu_poll_interval_ms: 100
  # Exponential backoff cap in seconds
  reconnect_max_delay_s: 16

detection:
  # SECONDARY person detector (YOLO11n INT8-quantized xquant-split).
  # PRIMARY person detection is done by the pose model (yolov8n-pose).
  # INT8 quantization breaks cls/obj heads (~0.5 sigmoid for ALL classes),
  # so detection relies on DFL peakiness + person geometry filtering.
  # DFL signal: uniform=0.0625, weak=0.10, clear=0.25+, peak=0.70+.
  # Use this as the secondary detector to supplement pose detections.
  # Model from: https://archive.spacemit.com/spacemit-ai/model_zoo/vision/yolo11/yolo11n.q.onnx
  backend: ai_accel
  model_path: "models/Human Recognition/yolo11n.q.onnx"
  confidence_threshold: 0.12   # DFL peakiness: uniform=0.0625, weak=0.10, clear=0.25+, peak=0.70+
  iou_threshold: 0.40           # tighter NMS to suppress overlapping boxes on same person
  input_size: [640, 640]
  classes: 80
  # ── Keypoint-based anatomical validation ──
  # Rejects detections whose keypoints fail anatomical plausibility checks
  # (shoulder symmetry, torso proportions, limb ratios, head position).
  # Set keypoint_min_count to 0 to disable keypoint filtering.
  keypoint_min_count: 6           # raised from 5: minimum valid keypoints for human detection
  keypoint_min_confidence: 0.30   # per-keypoint confidence threshold
  keypoint_validity_threshold: 0.50  # raised from 0.40: overall anatomical score for acceptance
  # ── Cascade optimization ──
  # When tracking is stable (confirmed tracks exist), the pipeline enters
  # TRACKING mode: skip YOLO11n secondary detector, reduce face detection
  # frequency. Every cascade_validation_interval frames, a full-resolution
  # validation frame runs both models to catch new entries.
  cascade_enabled: true
  cascade_validation_interval: 15  # frames between full-res re-validation
  cascade_secondary_interval: 5    # frames between YOLO11n runs in TRACKING mode (5 = ~15% of frames)
  cascade_tracking_resolution: [320, 320]  # reduced input when tracking (not yet used by fixed-input models)
  # ── Stricter fallback when no pose data available ──
  fallback_confidence: 0.20       # conf threshold when YOLO11n runs without pose model
  fallback_area_ratio_min: 0.008  # min bbox area ratio without pose validation

pose:
  # PRIMARY person detector + pose estimator (YOLOv8n-pose, xquant-split).
  # This model detects people AND estimates 17 COCO keypoints in one pass.
  # The cls head is broken by INT8 quantization (same as YOLO11 detector),
  # so we use DFL peakiness as confidence. Keypoints may also be partially
  # broken but bounding boxes from DFL are the primary output for tracking.
  # DFL: uniform=0.0625, real signal=0.20-0.70.
  backend: ai_accel
  model_path: "models/Action Prediction/Skeleton Recognition/yolov8n-pose.q.onnx"
  confidence_threshold: 0.10   # DFL peakiness for xquant-split models (uniform=0.0625)
  iou_threshold: 0.40
  input_size: [640, 640]
  num_keypoints: 17
  skeleton_type: coco

face:
  # SUPPLEMENTARY face detection + recognition (optional, reduced frequency).
  # Face detection runs every 5 frames when people are detected,
  # every 60 frames otherwise. Not critical for the primary task of
  # person detection + pose estimation + action recognition.
  detection_backend: ai_accel
  recognition_backend: ai_accel
  detection_model_path: "models/Face Recognition/yolov5n-face_cut.q.onnx"
  recognition_model_path: "models/Face Recognition/arcface_mobilefacenet_cut.q.onnx"
  face_min_size: 24
  confidence_threshold: 0.50
  similarity_threshold: 0.55
  input_size: [320, 320]
  embedding_dim: 128   # ArcFace MobileFaceNet-cuted outputs [1,128]; must match FEATURE_VECTOR_DIM
  liveness_detection: false

action:
  enabled: true
  backend: ai_accel
  model_path: "models/Action Prediction/Skeleton-based Action Prediction/stgcn.fp32.onnx"
  num_frames: 30
  num_keypoints: 14
  num_persons: 1
  num_classes: 7    # Auto-detected from model output shape at load time; 7-class subset of NTU RGB+D
  confidence_threshold: 0.50
  inference_interval: 10   # frames between ST-GCN inference runs (10 frames @ ~3.5 FPS = ~3s)

tracking:
  max_lost: 30                    # reduced from 60: 30f @ 3.5 FPS = 8.5s max prediction
  max_occluded_frames: 45         # reduced from 90: extended but not infinite
  min_iou: 0.30
  max_distance: 5.0
  max_track_history: 300
  kalman_process_noise: 0.05
  kalman_measurement_noise: 0.10
  # ── Enhanced confirmation (lowered for faster response) ──
  confirmation_frames: 3          # reduced from 5: 3 hits ≈ 0.85s to confirm
  min_keypoints_for_confirm: 3    # lowered from 4: faster confirm for partial-body
  min_keypoints_strong: 6         # lowered from 8: INT8 keypoints rarely reach 8
  spatial_jump_max_m: 3.0         # reject implausible position jumps (>3m/frame)
  # ── Cascade matching (NEW) ──
  cascade_max_age: 30             # max frames since update for cascade levels
  cascade_min_hits: 3             # min hits before track enters cascade
  appearance_weight: 0.35          # weight of appearance vs IoU in cost matrix
  appearance_max_dist: 0.50        # cosine distance gate for appearance matching
  iou_threshold_low: 0.15          # second-stage IoU for occlusion recovery
  # ── Occlusion handling (NEW) ──
  upper_body_min_keypoints: 4      # min upper-body keypoints for partial detection
  side_body_min_keypoints: 3       # min one-side keypoints for lateral view
  occlusion_score_threshold: 0.40  # below this ratio → considered occluded
  # ── Re-identification (NEW) ──
  reid_pool_max_age: 60           # frames to keep deleted track in re-id pool
  # ── Multi-person detection (NEW) ──
  new_person_grace_frames: 3       # grace period for new person detection trigger
  init_state:
    position_variance: 0.1
    velocity_variance: 0.01
  noise:
    process_position: 0.01
    process_velocity: 0.002
    measurement: 0.04
  ema_alpha: 0.25

spatial:
  fx: 960.0
  fy: 960.0
  cx: 960.0
  cy: 540.0
  avg_human_height: 1.70
  min_depth: 0.3
  max_depth: 120.0
  imu_pitch_correction: true
  camera_tilt_deg: 0.0
  earth_radius: 6371000.0
  coordinate_type: enu_local

imu:
  source: arrow_uart
  sensor: external
  gps_source: none
  mag_declination: -5.5
  accel_bias_x: 0.0
  accel_bias_y: 0.0
  accel_bias_z: 0.0
  gyro_bias_x: 0.0
  gyro_bias_y: 0.0
  gyro_bias_z: 0.0

mahony:
  kp: 0.5
  ki: 0.01
  sample_freq: 200.0
  two_kp: 1.0
  two_ki: 0.02

vins:
  enabled: false
  max_features: 150
  min_parallax: 10.0
  sliding_window_size: 10
  imu_integration_time: 0.05

atw:
  enabled: false
  method: reprojection
  prediction_ms: 33
  motion_model: imu_only

kcplite:
  enabled: false
  mtu: 1400
  window_size: 128
  nodelay: 1
  resend: 2
  rx_queue_size: 64

visualization:
  show_info_bar: true
  corner_markers: true
  crosshair: true
  render_size: [1920, 1080]
  line_width: 2
  font_scale: 2.0
  show_ids: true
  show_trajectory: true
  trajectory_length: 45
  draw_skeleton: true
  skeleton_line_width: 1
  point_radius: 3
  show_fps: true
  show_depth: true
  show_imu_overlay: true
  record_to_video: false            # explicit opt-in via --save-video CLI flag
  display_enabled: false            # enable via --display CLI flag
  display_device: "/dev/fb0"
  rtsp_enabled: false               # enable via --rtsp CLI flag
  rtsp_url: "rtsp://0.0.0.0:8554/live"
  video_output_path: "output/realtime_output.mp4"
  colors:
    - [0, 255, 0]
    - [255, 0, 0]
    - [0, 0, 255]
    - [255, 255, 0]
    - [255, 0, 255]
    - [0, 255, 255]
    - [255, 128, 0]
    - [128, 0, 255]

ai_acceleration:
  platform: onnx_runtime_spacemit_ep
  precision: fp32
  power_mode: balanced
  ddr_bw_limit_mbps: 5400
  model_cache_dir: "/var/lib/lingqi_ai_cache"
  preload_models: true
  warmup_runs: 3

performance:
  rvv_enabled: true
  rvv_vlen: 256
  openmp_threads: 6
  pipeline_pin_to_core: true
  imu_core: 0
  inference_core: 1
  visualization_core: 2
  l1_cache_optimize: true
  realtime_scheduling: true
  rt_priority: 50

k1_hardware:
  enabled: true
  cluster0_ai_cores: "0-3"
  cluster1_io_cores: "4-7"
  tcm:
    enabled: true
    tcm_device: "/dev/tcm"
    tcm_size_kb: 512
    preload_model_weights: true
    model_weight_max_kb: 480
  vpu:
    enabled: true
    mpp_device: "/dev/mpp_service"
    hardware_jpeg_decode: true
    hardware_h264_encode: true
    max_encode_resolution: [1920, 1080]
    encoder_bitrate_kbps: 4000
  jpu:
    enabled: true
    jpu_device: "/dev/jpu"
    prefer_hardware: true
  gpu:
    enabled: true
    drm_device: "/dev/dri/renderD128"
    opengl_visualization: false
  pipeline:
    ring_buffer_size: 4
    capture_thread_cpu: 4
    infer_thread_cpu: 1
    postprocess_thread_cpu: 0
    viz_thread_cpu: 6
    output_thread_cpu: 7
    imu_thread_cpu: 0
  power:
    cpu_freq_max_mhz: 1600
    governor: "performance"
    dvfs_enabled: false
  ddr:
    bandwidth_limit_mbps: 5400
    optimize_access_pattern: true
