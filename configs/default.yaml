system:
  use_onnx: true
  # SpacemiT EP (RVV 1.0 + IME 2.0 TOPS hardware accel via libspacemit_ep.so).
  # IMPORTANT: SpacemiT EP only supports INT8-quantized models (.q.onnx
  # produced by xquant, per Bianbu 4.3 / 7.1 docs). Feeding FP32 models
  # causes worker-thread std::runtime_error("tcm buffer alloc failed").
  # The bridge auto-detects quantization (scans for QuantizeLinear/
  # QLinearConv ops) and only registers the EP for quantized models;
  # FP32 models silently use CPU EP (still real ONNX, no acceleration).
  # Quantize with SpacemiT's xquant tool:
  #   https://bianbu.spacemit.com/en/brdk/Advanced_development/7.1_Model_Quantization/
  use_spacemit_ep: true
  # Per-session intra-op threads for SpacemiT EP. K1 has only ~512KB TCM
  # per AI core (cluster 0).  Each thread needs its own TCM workspace.
  #   intra=1: ~170KB TCM per session — allows up to 3 EP sessions (510KB/512KB)
  #   intra=2: ~340KB TCM — allows 1 EP session safely, 2 risky (680KB > 512KB)
  #   intra=3: ~510KB TCM — 1 EP session only
  #   intra=4: may trigger "tcm buffer alloc failed" — do not use
  # K1 Cluster0: 512KB shared TCM across 4 AI cores.
  # intra=1 maximizes EP coverage: YOLOv8-Pose + Face (3 EP sessions).
  #
  # Current EP session allocation (3 models on SpacemiT EP):
  #   1. yolov8n-pose.q.onnx  (~170KB TCM) — person detection + 17-keypoint pose
  #   2. yolov5n-face_320_cut.q.onnx (~170KB TCM) — face detection
  #   3. arcface_mobilefacenet_cut.q.onnx (~170KB TCM) — face recognition
  #   Total: ~510KB / 512KB TCM — fully utilized, no headroom for more EP models.
  #
  # stgcn.fp32.onnx uses CPU EP (not quantized) — runs on general-purpose core.
  # To add ST-GCN to EP: quantize stgcn → .q.onnx, then reduce face_interval
  # so face models don't compete for TCM with ST-GCN's session.
  spacemit_ep_intra_threads: 1  # intra=1 only — max EP models on K1's 512KB TCM
  log_level: INFO
  startup_mode: realtime
  max_frames: 0
  ring_buffer_size: 16
  target_fps: 15.0
  worker_threads: 4

video:
  source: camera
  camera_device: "/dev/video1"   # K1: /dev/video0=VPU, /dev/video1=CCIC1 MIPI CSI camera
  camera_width: 640
  camera_height: 480
  camera_fps: 15.0
  camera_format: MJPEG
  camera_buffer_count: 4
  video_path: ""
  output_path: "output/result.mp4"
  save_frame_interval: 1
  capture_min_interval_ms: 0      # 0=disabled; set to ~200 for consistent 5 FPS decimation

coap:
  enabled: true
  esp_ip: "192.168.4.1"
  esp_port: 5683
  wifi_ssid: "ESP32-Camera-AP"
  wifi_password: "12345678"
  frame_timeout_s: 10

k1_imu:
  enabled: false          # GY85 (ADXL345+ITG3205) not populated on most Muse Pi Pro boards
  i2c_bus: 4
  sample_rate_hz: 100
  calibration_samples: 200

madgwick:
  beta: 0.08
  sample_freq_hz: 100.0

dual_imu:
  alignment_window: 200
  alignment_timeout_s: 10.0

# ── Phase A: K1 Odometry (INS + ZUPT) ──
odometry:
  enabled: true
  init_duration_s: 2.0           # 重力对齐静止时间 (s)
  zupt_accel_thresh: 0.15        # 简单阈值: 加速度偏离 g 的阈值 (m/s²)
  zupt_gyro_thresh: 0.15         # 简单阈值: 陀螺仪模长阈值 (rad/s), 0.15 对 MEMS 合理
  zupt_window_size: 5            # GLRT 滑动窗口大小
  sigma_accel: 0.01              # 加速度计噪声标准差 (m/s²)
  sigma_gyro: 0.015              # 陀螺仪噪声标准差 (rad/s)
  glrt_threshold: 500.0           # GLRT statistic threshold (was 300000, then 500)
  export_csv: true               # 导出 K1 轨迹 CSV

# ── Phase B: World Coordinate System ──
world_coord:
  enabled: true
  max_persons: 64
  person_timeout_s: 60.0          # 人消失后保留世界坐标的时长
  skeleton_fixed_ratio: true      # 用固定人体比例估算骨架 3D
  export_csv: true
  # ── 自适应世界锚点 (参考 SEVIS-3D Schmidt-EKF) ──
  anchor_motion_threshold: 0.30   # 运动检测阈值 (m): 低于此值锁定锚点不动
  anchor_moving_alpha: 0.15       # 移动时的慢速动量 (低=更平滑但响应慢)

# ── Phase C+D: AR Render / Distance Labels ──
ar_render:
  skeleton_3d_mode: true          # true=世界坐标投影骨架, false=YOLO 2D
  distance_labels: true           # 显示 K1 相对距离标签
  show_k1_compass: true           # 显示 K1 指南针 (yaw 指示器)
  show_k1_speed: true             # 显示 K1 速度条 (km/h)

detection:
  # SECONDARY person detector — DISABLED in unified mode.
  # yolov8n-pose (pose section below) does BOTH person detection AND 17-keypoint
  # pose estimation in a single forward pass — no separate detector needed.
  # This saves ~150ms/frame (one full EP inference) and one TCM slot.
  # Set model_path to a valid .q.onnx file to re-enable the secondary detector.
  backend: ai_accel
  model_path: ""
  confidence_threshold: 0.12
  iou_threshold: 0.40
  input_size: [640, 640]
  classes: 80
  # ── Tuned for 320×320 INT8-quantized model ──
  # quantized keypoints rarely exceed 0.15 confidence.
  keypoint_min_count: 2            # allow 2 visible keypoints (was 3)
  keypoint_min_confidence: 0.05    # ultra-low for INT8 model (was 0.08)
  keypoint_validity_threshold: 0.12 # relaxed anatomical check (was 0.25)
  # ── Cascade optimization (single-model mode) ──
  cascade_enabled: false
  cascade_validation_interval: 15
  cascade_secondary_interval: 5
  cascade_tracking_resolution: [320, 320]
  fallback_confidence: 0.08        # lowered from 0.20 for weak DFL peaks
  fallback_area_ratio_min: 0.004   # lowered from 0.008 to catch distant people

pose:
  # PERSON detector + pose estimator — selectable model variant.
  #
  # Supported variants and their model files:
  #   yolov8n-pose  → models/Action Prediction/Skeleton Recognition/yolov8n-pose.q.onnx
  #   yolo11n-pose  → models/Action Prediction/Skeleton Recognition/yolo11n-pose.q.onnx
  #
  # YOLOv8n-pose: 3.3M params, 9.2 GFLOPs, AP 48.0 on COCO-Pose.
  # YOLO11n-pose: better architecture (C3k2 blocks, anchor-free), higher mAP.
  # Both are INT8-quantized for SpacemiT EP acceleration.
  #
  # DFL peakiness used as confidence (cls head broken by INT8 quantization).
  # 480×480: 44% fewer pixels than 640, ~40% faster inference.
  backend: ai_accel
  # "yolov8n-pose" or "yolo11n-pose"
  model_variant: "yolov8n-pose"
  confidence_threshold: 0.04      # ultra-low for 320x320 INT8 model (was 0.06)
  iou_threshold: 0.55             # OKS-NMS: raised from 0.40 to suppress duplicate detections from INT8 model
  input_size: [480, 480]          # model's actual input is 320x320 (overridden at load)
  num_keypoints: 17
  skeleton_type: coco

face:
  # SUPPLEMENTARY face detection + recognition (optional, reduced frequency).
  # Face detection runs every 5 frames when people are detected,
  # every 60 frames otherwise. Not critical for the primary task of
  # person detection + pose estimation + action recognition.
  detection_backend: ai_accel
  recognition_backend: ai_accel
  detection_model_path: "models/Face Recognition/yolov5n-face_320_cut.q.onnx"
  recognition_model_path: "models/Face Recognition/arcface_mobilefacenet_cut.q.onnx"
  face_min_size: 24
  confidence_threshold: 0.50
  similarity_threshold: 0.55
  input_size: [320, 320]
  embedding_dim: 128   # ArcFace MobileFaceNet-cuted outputs [1,128]; must match FEATURE_VECTOR_DIM
  use_ep: false        # Enable SpacemiT EP (IO Binding required for safe TCM output reads)
  liveness_detection: false

action:
  enabled: true
  backend: ai_accel
  model_path: "models/Action Prediction/Skeleton-based Action Prediction/stgcn_int8.onnx"
  # num_frames/num_keypoints/num_persons are auto-detected from model input shape
  # at load time.  These values are fallback defaults only.
  # The INT8 ST-GCN model expects NTU-RGB+D standard: 300 frames, 25 keypoints, 2 persons.
  num_frames: 300        # fallback — auto-detected from model
  num_keypoints: 25      # fallback — auto-detected from model (NTU-RGB+D 25 joints)
  num_persons: 2         # fallback — auto-detected from model
  num_classes: 7          # Auto-detected from model output shape at load time; 7-class subset of NTU RGB+D
  confidence_threshold: 0.50
  # ST-GCN now uses INT8-quantized model → SpacemiT EP acceleration (~3× faster vs CPU FP32).
  # inference_interval=15: run every 15 pose frames ≈ every 1.5s at 10 FPS.
  inference_interval: 15

tracking:
  max_lost: 30                    # 30f @ 3.5 FPS = 8.5s max prediction
  max_occluded_frames: 45         # extended but not infinite
  min_iou: 0.18                    # relaxed: easier to match detections across frames
  max_distance: 40                 # pixels — relaxed from 5 to reduce false mismatches
  max_track_history: 300
  kalman_process_noise: 0.05
  kalman_measurement_noise: 0.10
  # ── Enhanced confirmation (tuned for 640×480 at close range) ──
  confirmation_frames: 1           # 1 hit to confirm: faster track locking
  min_keypoints_for_confirm: 2     # only 2 keypoints needed
  min_keypoints_strong: 3          # lowered: INT8 model rarely exceeds 3 strong kpts
  spatial_jump_max_m: 5.0          # relaxed: allow larger jumps for noisy 640×480
  # ── Cascade matching ──
  cascade_max_age: 30
  cascade_min_hits: 1              # lowered from 2: faster re-identification
  appearance_weight: 0.20           # rely more on IoU than appearance
  appearance_max_dist: 0.70         # relaxed cosine distance gate
  iou_threshold_low: 0.15           # lower IoU gate for fast-moving objects
  # ── Occlusion handling ──
  upper_body_min_keypoints: 3
  side_body_min_keypoints: 2
  occlusion_score_threshold: 0.25   # lowered occlusion threshold
  # ── Re-identification (NEW) ──
  reid_pool_max_age: 60           # frames to keep deleted track in re-id pool
  # ── Multi-person detection (NEW) ──
  new_person_grace_frames: 1       # reduced grace period: faster new person detection
  init_state:
    position_variance: 0.15        # increased initial uncertainty
    velocity_variance: 0.02
  noise:
    process_position: 0.02
    process_velocity: 0.005
    measurement: 0.06              # increased: trust measurement less (noisy INT8)
  ema_alpha: 0.35                   # increased: more responsive to new detections

spatial:
  fx: 650.0                         # OV3660 @ 640×480: f=3mm/1.4µm×640/2048≈670, 取 650
  fy: 650.0                         # 深度公式 Z = H×fy/bbox_h, 精确值需实际标定
  cx: 320.0                         # 640×480 图像中心
  cy: 240.0                         # 640×480 图像中心
  avg_human_height: 1.70
  min_depth: 0.3
  max_depth: 120.0
  imu_pitch_correction: true
  camera_tilt_deg: 0.0
  earth_radius: 6371000.0
  coordinate_type: enu_local
  # ── Depth estimation (2024-2026 academic refinements) ──
  # Uses multi-point anatomical sampling + tilt correction + MAD fusion.
  # EMA smooths frame-to-frame jitter per tracked person.
  depth_ema_alpha: 0.30          # EMA smoothing factor (0=no smoothing, 1=instant)
  depth_outlier_mad_mult: 2.5    # MAD multiplier for outlier rejection (higher=more tolerant)
  depth_min_keypoint_conf: 0.25  # minimum per-keypoint confidence for depth sampling

imu:
  source: coap_udp
  sensor: external
  gps_source: none
  mag_declination: -5.5
  accel_bias_x: 0.0
  accel_bias_y: 0.0
  accel_bias_z: 0.0
  gyro_bias_x: 0.0
  gyro_bias_y: 0.0
  gyro_bias_z: 0.0

mahony:
  kp: 0.5
  ki: 0.01
  sample_freq: 200.0
  two_kp: 1.0
  two_ki: 0.02

vins:
  enabled: false
  max_features: 150
  min_parallax: 10.0
  sliding_window_size: 10
  imu_integration_time: 0.05

atw:
  enabled: false
  method: reprojection
  prediction_ms: 33
  motion_model: imu_only

kcplite:
  enabled: false
  mtu: 1400
  window_size: 128
  nodelay: 1
  resend: 2
  rx_queue_size: 64

visualization:
  show_info_bar: true
  corner_markers: true
  crosshair: true
  render_size: [1920, 1080]
  line_width: 2
  font_scale: 2.0
  show_ids: true
  show_trajectory: true
  trajectory_length: 45
  draw_skeleton: true
  skeleton_line_width: 1
  point_radius: 3
  show_fps: true
  show_depth: true
  show_imu_overlay: true
  record_to_video: true             # save video by default when pipeline runs
  display_enabled: false            # enable via --display CLI flag
  display_device: "/dev/fb0"
  rtsp_enabled: false               # enable via --rtsp CLI flag
  rtsp_url: "rtsp://0.0.0.0:8554/live"
  video_output_path: "output/realtime_output.mp4"
  colors:
    - [0, 255, 0]
    - [255, 0, 0]
    - [0, 0, 255]
    - [255, 255, 0]
    - [255, 0, 255]
    - [0, 255, 255]
    - [255, 128, 0]
    - [128, 0, 255]

ai_acceleration:
  platform: onnx_runtime_spacemit_ep
  precision: fp32
  power_mode: balanced
  ddr_bw_limit_mbps: 5400
  model_cache_dir: "/var/lib/lingqi_ai_cache"
  preload_models: true
  warmup_runs: 3

# ── Frame Differencing: Adaptive Frame Skip ──
# Skips YOLO inference on near-identical frames by computing a fast
# subsampled MAD (Mean Absolute Difference) against the last processed
# reference frame.  This is the single most impactful optimization for
# real-world video: static scenes save ~150ms/frame on K1.
#
# Algorithm:
#   1. Divide frame into grid_w × grid_h cells
#   2. In each cell, sample every subsample-th pixel
#   3. Compute per-channel MAD for each cell
#   4. Cell is "changed" if MAD > cell_threshold
#   5. Frame needs processing if changed_ratio > change_threshold
#
# Activity classification:
#   STATIC      (< 5% cells changed):  skip up to max_static_skip frames
#   LOW_MOTION  (5-15% cells changed): skip up to max_low_motion_skip frames
#   ACTIVE      (> 15% cells changed): process every frame
#
# Cost: ~0.2ms per comparison (640×480, stride=4, 8×8 grid)
# Savings: ~150ms per skipped frame → up to 10× effective throughput
frame_diff:
  enabled: true                   # master switch
  grid_w: 8                       # horizontal grid cells
  grid_h: 8                       # vertical grid cells
  subsample: 4                    # pixel stride within each cell (4=every 4th pixel)
  cell_threshold: 8.0             # MAD per channel to mark cell "changed" (0-255)
  change_threshold: 0.15          # fraction of changed cells to trigger full inference
  adaptive_enabled: true          # enable adaptive skip limits
  max_static_skip: 20             # max consecutive skips in static scenes
  max_low_motion_skip: 5          # max consecutive skips in low-motion scenes
  force_process_every: 30         # force full inference every N frames (drift guard)

performance:
  rvv_enabled: true
  rvv_vlen: 256
  # ── Thread parallelism strategy for K1 8-core ──
  # Cluster0 (AI cores 0-3): 512KB shared TCM → AI inference
  #   Core 0: PostProcess (tracking + spatial engine, stripped from rendering)
  #   Core 1: Inference main (YOLO pose + face detect + ArcFace)
  #   Core 2: ST-GCN action recognition (CPU EP, FP32)
  #   Core 3: OpenMP worker
  # Cluster1 (I/O cores 4-7): Data movement + visualization
  #   Core 4: Capture (CoAP receive + JPEG decode via JPU)
  #   Core 5: OpenMP worker
  #   Core 6: Viz thread (visualizer rendering + fb/SDL2/RSTP output)
  #   Core 7: OpenMP worker / OS background
  openmp_threads: 6       # 4 cores Cluster0 + 2 cores Cluster1 for parallel loops
  pipeline_pin_to_core: true
  imu_core: 0
  inference_core: 1
  visualization_core: 2
  l1_cache_optimize: true
  realtime_scheduling: true
  rt_priority: 50

k1_hardware:
  enabled: true
  cluster0_ai_cores: "0-3"
  cluster1_io_cores: "4-7"
  tcm:
    enabled: true
    tcm_device: "/dev/tcm"
    tcm_size_kb: 512
    preload_model_weights: true
    model_weight_max_kb: 480
  vpu:
    enabled: true
    mpp_device: "/dev/mpp_service"
    hardware_h264_encode: true
    max_encode_resolution: [1920, 1080]
    encoder_bitrate_kbps: 4000
  gpu:
    enabled: true
    drm_device: "/dev/dri/renderD128"
    opengl_visualization: false
  pipeline:
    ring_buffer_size: 4
    # ── K1 ∞-core pipeline mapping (optimized for multi-model parallelism) ──
    # Cluster0 (AI, cores 0-3, 512KB shared TCM):
    #   CPU 0: PostProcess (visualizer + tracker + spatial engine + output)
    #   CPU 1: Inference (YOLO pose + face detect/recog + ST-GCN dispatch)
    #   CPU 2: Reserved for future ST-GCN EP or parallel model inference
    #   CPU 3: OpenMP worker / spare
    # Cluster1 (I/O, cores 4-7):
    #   CPU 4: Capture (CoAP receive + JPEG decode)
    #   CPU 5: VPU/JPU offload / spare
    #   CPU 6: OpenMP worker
    #   CPU 7: OpenMP worker / OS background
    capture_thread_cpu: 4
    infer_thread_cpu: 1
    postprocess_thread_cpu: 0
    viz_thread_cpu: 6
    output_thread_cpu: 7
    imu_thread_cpu: 0
  power:
    cpu_freq_max_mhz: 1600
    governor: "performance"
    dvfs_enabled: false
  ddr:
    bandwidth_limit_mbps: 5400
    optimize_access_pattern: true
